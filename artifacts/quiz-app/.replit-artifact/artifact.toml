kind = "web"
previewPath = "/"
title = "穴埋め問題システム"
version = "1.0.0"
id = "artifacts/quiz-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24311
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/quiz-app run dev"

[services.env]
PORT = "24311"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/quiz-app", "run", "build"]
publicDir = "artifacts/quiz-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
